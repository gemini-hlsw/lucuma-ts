packages:
  - packages/*

injectWorkspacePackages: true

# 2 days, in minutes
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@gemini-hlsw/*'

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 20160 # 2 weeks

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  prisma: true
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false
  unrs-resolver: false


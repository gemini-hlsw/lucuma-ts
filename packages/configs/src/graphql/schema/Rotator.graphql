#import RotatorTrackingMode from '@gemini-hlsw/lucuma-schemas/navigate'
#import PosInt from "@gemini-hlsw/lucuma-schemas/odb"

type Rotator {
  "Record primary key"
  pk: PosInt!
  "Rotator angle"
  angle: Float!
  "Tracking mode"
  tracking: RotatorTrackingMode!
}

type Query {
  rotator: Rotator
}

type Mutation {
  updateRotator(
    "Primary key"
    pk: PosInt!
    "Rotator angle"
    angle: Float
    "Tracking mode"
    tracking: RotatorTrackingMode
  ): Rotator!
}

#import Instrument, ObservationId, PosInt from '@gemini-hlsw/lucuma-schemas/odb'

enum GuidingType {
  NORMAL
}

enum BaffleMode {
  AUTO
  MANUAL
  IGNORED
}

enum CentralBaffle {
  CLOSED
  OPEN
}

enum DeployableBaffle {
  EXTENDED
  NEAR_IR
  THERMAL_IR
  VISIBLE
}

enum Fpu {
  LONG_SLIT_1
  LONG_SLIT_2
  LONG_SLIT_3
  LONG_SLIT_4
  LONG_SLIT_6
  LONG_SLIT_8
  PINHOLE
  SUB_PIX_PINHOLE
  IFU2_SLITS
  IFU_BLUE
  IFU_RED
  LONG_SLIT_0_25
  LONG_SLIT_0_50
  LONG_SLIT_0_75
  LONG_SLIT_1_00
  LONG_SLIT_1_50
  LONG_SLIT_2_00
  LONG_SLIT_5_00
  NS0
  NS1
  NS2
  NS3
  NS4
  NS5
  IFU_NS2_SLITS
  IFU_NS_BLUE
  IFU_NS_RED
}

type Configuration {
  pk: PosInt!
  selectedTarget: Int
  selectedOiTarget: Int
  selectedP1Target: Int
  selectedP2Target: Int
  selectedGuiderTarget: Int
  oiGuidingType: GuidingType!
  p1GuidingType: GuidingType!
  p2GuidingType: GuidingType!
  obsTitle: String
  obsId: ObservationId
  obsInstrument: Instrument
  obsSubtitle: String
  obsReference: String
  baffleMode: BaffleMode!
  "Only when baffleMode is MANUAL"
  centralBaffle: CentralBaffle
  "Only when baffleMode is MANUAL"
  deployableBaffle: DeployableBaffle
  fpu: Fpu
}

type Query {
  configuration(pk: PosInt): Configuration
}

type Mutation {
  createConfiguration(
    selectedTarget: Int
    selectedOiTarget: Int
    selectedP1Target: Int
    selectedP2Target: Int
    selectedGuiderTarget: Int
    oiGuidingType: GuidingType!
    p1GuidingType: GuidingType!
    p2GuidingType: GuidingType!
    obsTitle: String
    obsId: ObservationId
    obsInstrument: Instrument
    obsSubtitle: String
    obsReference: String
    baffleMode: BaffleMode!
    centralBaffle: CentralBaffle
    deployableBaffle: DeployableBaffle
    fpu: Fpu
  ): Configuration!

  updateConfiguration(
    pk: PosInt!
    selectedTarget: Int
    selectedOiTarget: Int
    selectedP1Target: Int
    selectedP2Target: Int
    selectedGuiderTarget: Int
    oiGuidingType: GuidingType
    p1GuidingType: GuidingType
    p2GuidingType: GuidingType
    obsTitle: String
    obsId: ObservationId
    obsInstrument: Instrument
    obsSubtitle: String
    obsReference: String
    baffleMode: BaffleMode
    centralBaffle: CentralBaffle
    deployableBaffle: DeployableBaffle
    fpu: Fpu
  ): Configuration!
}
